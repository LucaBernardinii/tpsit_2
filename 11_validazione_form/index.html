<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrazione Studenti</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); max-width: 500px; }
        h1 { text-align: center; color: #333; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input[type="text"], input[type="date"], select { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 4px; font-size: 14px; }
        input:focus, select:focus { outline: none; border-color: #4CAF50; }
        .error { border-color: #ff0000 !important; background-color: #ffe6e6; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; }
        .numero-field { display: none; }
        .numero-field.active { display: block; }
        button { width: 100%; padding: 12px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #45a049; }
        .error-container { display: none; margin-top: 20px; padding: 15px; background: #ffcccc; border: 2px solid #ff0000; border-radius: 4px; }
        .error-container.show { display: block; }
        .error-item { color: #cc0000; margin: 5px 0; font-size: 13px; list-style: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Registrazione</h1>
        <form id="registrationForm">
            <!-- Nome -->
            <div class="form-group">
                <label for="nome">Nome *</label>
                <input type="text" id="nome" placeholder="Inserisci il nome">
            </div>

            <!-- Cognome -->
            <div class="form-group">
                <label for="cognome">Cognome *</label>
                <input type="text" id="cognome" placeholder="Inserisci il cognome">
            </div>

            <!-- Data di Nascita -->
            <div class="form-group">
                <label for="dataNascita">Data di Nascita *</label>
                <input type="date" id="dataNascita">
            </div>

            <!-- Codice Fiscale -->
            <div class="form-group">
                <label for="codiceFiscale">Codice Fiscale *</label>
                <input type="text" id="codiceFiscale" placeholder="Es: RSSMRA90A01H501Z" maxlength="16">
            </div>

            <!-- Classe -->
            <div class="form-group">
                <label for="classe">Classe *</label>
                <select id="classe">
                    <option value="">-- Seleziona classe --</option>
                    <option value="1">1ª</option>
                    <option value="2">2ª</option>
                    <option value="3">3ª</option>
                    <option value="4">4ª</option>
                    <option value="5">5ª</option>
                </select>
            </div>

            <!-- Sezione -->
            <div class="form-group">
                <label for="sezione">Sezione *</label>
                <select id="sezione">
                    <option value="">-- Seleziona sezione --</option>
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                    <option value="D">D</option>
                    <option value="E">E</option>
                </select>
            </div>

            <!-- Ripetente -->
            <div class="form-group">
                <div class="checkbox-group">
                    <input type="checkbox" id="ripetente">
                    <label for="ripetente">Sono uno studente ripetente</label>
                </div>
            </div>

            <!-- Anni Ripetuti -->
            <div class="form-group numero-field" id="numeriField">
                <label for="anniRipetuti">Anni Ripetuti *</label>
                <input type="text" id="anniRipetuti" placeholder="Inserisci numero (1-3)">
            </div>

            <!-- Uscita -->
            <div class="form-group">
                <label for="uscita">Sbocco Professionale *</label>
                <select id="uscita">
                    <option value="">-- Seleziona opzione --</option>
                    <option value="lavoro">Lavoro</option>
                    <option value="università">Università</option>
                    <option value="formazione">Formazione Professionale</option>
                    <option value="estero">Estero</option>
                    <option value="altro">Altro</option>
                </select>
            </div>

            <!-- Submit Button -->
            <button type="submit">Registra Studente</button>

            <!-- Error Container -->
            <div class="error-container" id="errorContainer">
                <h3>Errori trovati:</h3>
                <ul id="errorList"></ul>
            </div>
        </form>
    </div>

    <script src="validation.js"></script>
</body>
</html>
