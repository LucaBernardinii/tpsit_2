<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrazione</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 500px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #4CAF50;
        }
        input.error, select.error {
            border-color: #ff0000 !important;
            background-color: #ffe6e6;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .numero-field {
            display: none;
        }
        .numero-field.active {
            display: block;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            font-size: 16px;
        }
        button:hover {
            background: #45a049;
        }
        .error-container {
            margin-top: 15px;
            padding: 15px;
            background: #ffcccc;
            border: 2px solid #ff0000;
            border-radius: 4px;
            display: none;
        }
        .error-container.show {
            display: block;
        }
        .error-item {
            color: #cc0000;
            margin: 5px 0;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Registrazione</h1>
        <form id="form">
            <div class="form-group">
                <label for="nome">Nome *</label>
                <input type="text" id="nome" placeholder="Inserisci nome">
            </div>

            <div class="form-group">
                <label for="cognome">Cognome *</label>
                <input type="text" id="cognome" placeholder="Inserisci cognome">
            </div>

            <div class="form-group">
                <label for="data">Data di Nascita *</label>
                <input type="date" id="data">
            </div>

            <div class="form-group">
                <label for="cf">Codice Fiscale *</label>
                <input type="text" id="cf" placeholder="Es: RSSMRA90A01H501Z" maxlength="16">
            </div>

            <div class="form-group">
                <label for="classe">Classe *</label>
                <select id="classe">
                    <option value="">-- Seleziona --</option>
                    <option value="1">1ª</option>
                    <option value="2">2ª</option>
                    <option value="3">3ª</option>
                    <option value="4">4ª</option>
                    <option value="5">5ª</option>
                </select>
            </div>

            <div class="form-group">
                <label for="sezione">Sezione *</label>
                <select id="sezione">
                    <option value="">-- Seleziona --</option>
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                </select>
            </div>

            <div class="form-group">
                <div class="checkbox-group">
                    <input type="checkbox" id="ripetente">
                    <label for="ripetente">Ripetente</label>
                </div>
            </div>

            <div class="form-group numero-field" id="anniField">
                <label for="anni">Anni Ripetuti *</label>
                <input type="number" id="anni" min="1" max="3" placeholder="1-3">
            </div>

            <div class="form-group">
                <label for="sbocco">Sbocco Professionale *</label>
                <select id="sbocco">
                    <option value="">-- Seleziona --</option>
                    <option value="lavoro">Lavoro</option>
                    <option value="università">Università</option>
                    <option value="formazione">Formazione Professionale</option>
                    <option value="estero">Estero</option>
                    <option value="altro">Altro</option>
                </select>
            </div>

            <button type="submit">Registra</button>

            <div class="error-container" id="errori">
                <strong>Errori:</strong>
                <div id="listaErrori"></div>
            </div>
        </form>
    </div>

    <script src="validation.js"></script>
</body>
</html>
