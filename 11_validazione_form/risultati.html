<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Risultati</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            max-width: 600px;
        }
        h1 { color: #4CAF50; text-align: center; }
        .json-box {
            background: #f5f5f5;
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 4px;
            font-family: monospace;
            margin: 20px 0;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-back { background: #2196F3; color: white; }
        .btn-download { background: #FF9800; color: white; }
        .btn-new { background: #4CAF50; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>✓ Registrazione Completata!</h1>
        <p style="text-align: center;">Ecco i dati in formato JSON:</p>
        <div class="json-box" id="jsonBox"></div>
        <div class="buttons">
            <button class="btn-back" onclick="history.back()">Indietro</button>
            <button class="btn-download" onclick="scarica()">Scarica JSON</button>
            <button class="btn-new" onclick="nuova()">Nuova Reg.</button>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', function() {
            var dati = JSON.parse(localStorage.getItem('studentData') || '{}');
            
            if (!localStorage.getItem('studentData')) {
                window.location.href = 'index.html';
                return;
            }
            
            document.getElementById('jsonBox').textContent = JSON.stringify(dati, null, 2);
        });
        
        function scarica() {
            var dati = JSON.parse(localStorage.getItem('studentData') || '{}');
            var blob = new Blob([JSON.stringify(dati, null, 2)], {type: 'application/json'});
            var link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'registrazione.json';
            link.click();
        }
        
        function nuova() {
            localStorage.removeItem('studentData');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
