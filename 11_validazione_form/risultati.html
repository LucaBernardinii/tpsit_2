<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Risultati</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            max-width: 600px;
        }
        h1 {
            color: #4CAF50;
            text-align: center;
        }
        .json-box {
            background: #f5f5f5;
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 4px;
            font-family: monospace;
            margin: 20px 0;
            white-space: pre-wrap;
            word-break: break-word;
            overflow-x: auto;
        }
        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-back {
            background: #2196F3;
            color: white;
        }
        .btn-download {
            background: #FF9800;
            color: white;
        }
        .btn-new {
            background: #4CAF50;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✓ Registrazione Completata!</h1>
        <p style="text-align: center;">Dati in formato JSON:</p>
        <div class="json-box" id="json"></div>
        <div class="buttons">
            <button class="btn-back" onclick="history.back()">Indietro</button>
            <button class="btn-download" onclick="download()">Scarica</button>
            <button class="btn-new" onclick="location.href='index.html'">Nuova</button>
        </div>
    </div>

    <script>
        const dati = JSON.parse(localStorage.getItem('dati') || '{}');
        
        if (!localStorage.getItem('dati')) {
            location.href = 'index.html';
        }
        
        document.getElementById('json').textContent = JSON.stringify(dati, null, 2);
        
        function download() {
            const blob = new Blob([JSON.stringify(dati, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'registrazione.json';
            a.click();
        }
    </script>
</body>
</html>
